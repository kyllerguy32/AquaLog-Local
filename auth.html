<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaLog - Sign In</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      position: relative;
    }

    .auth-wrap::before {
      content: '';
      position: absolute;
      inset: -28px;
      border-radius: 36px;
      background: radial-gradient(circle at top, rgba(103, 216, 214, 0.16), transparent 58%);
      pointer-events: none;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      padding: 32px;
      position: relative;
      z-index: 1;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top right, rgba(140, 240, 234, 0.08), transparent 34%);
      pointer-events: none;
    }

    .auth-title { font-size: 28px; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .auth-submit {
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }

    .auth-toggle { text-align: center; font-size: 13px; color: var(--text2); margin-top: 16px; }
    .auth-toggle a { color: var(--accent3); cursor: pointer; font-weight: 700; text-decoration: none; }
    .auth-toggle a:hover { text-decoration: underline; }

    .auth-error {
      background: rgba(255, 126, 126, 0.12);
      border: 1px solid rgba(255, 126, 126, 0.22);
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      display: none;
    }

    .auth-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <img src="https://i.ibb.co/XfF9nN4X/Chat-GPT-Image-May-11-2026-05-18-16-PM.png" alt="AquaLog logo" class="brand-logo-img">
      </div>
      <div class="auth-logo-name">AquaLog</div>
    </div>

    <div class="auth-card">
      <h1 class="auth-title" id="auth-title">Welcome back</h1>
      <p class="auth-sub" id="auth-sub">Sign in to your account to continue.</p>

      <div class="auth-error" id="auth-error"></div>

      <form class="auth-form" id="auth-form">
        <div class="form-group" id="name-group" style="display:none">
          <label class="form-label">Display Name</label>
          <input type="text" class="form-input" id="name-input" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="pw-input" placeholder="Password" required minlength="6">
        </div>
        <div class="form-group" id="pw2-group" style="display:none">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="pw2-input" placeholder="Confirm password">
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="auth-btn">Sign In</button>
      </form>

      <p class="auth-note">All data is stored locally in your browser. No account is sent to any server.</p>
      <div class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-link"> Create one</a>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="nav.js"></script>
  <script>
    if (AquaDB.getUser()) {
      if (window.AquaUI?.navigate) window.AquaUI.navigate('dashboard.html');
      else window.location.href = 'dashboard.html';
    }

    let isSignup = false;

    document.getElementById('toggle-link').addEventListener('click', () => {
      isSignup = !isSignup;
      document.getElementById('auth-title').textContent = isSignup ? 'Create an account' : 'Welcome back';
      document.getElementById('auth-sub').textContent = isSignup ? 'Start tracking your aquariums.' : 'Sign in to your account to continue.';
      document.getElementById('auth-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
      document.getElementById('toggle-text').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-link').textContent = isSignup ? ' Sign in' : ' Create one';
      document.getElementById('name-group').style.display = isSignup ? '' : 'none';
      document.getElementById('pw2-group').style.display = isSignup ? '' : 'none';
      document.getElementById('auth-error').style.display = 'none';
    });

    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const pw = document.getElementById('pw-input').value;
      const errEl = document.getElementById('auth-error');

      const showErr = (msg) => {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      };

      errEl.style.display = 'none';

      const users = JSON.parse(localStorage.getItem('aqualog_users') || '[]');

      if (isSignup) {
        const name = document.getElementById('name-input').value.trim() || email.split('@')[0];
        const pw2 = document.getElementById('pw2-input').value;
        if (pw !== pw2) return showErr('Passwords do not match.');
        if (users.find((u) => u.email === email)) return showErr('An account with this email already exists.');
        const user = { email, name, pw, createdAt: new Date().toISOString() };
        users.push(user);
        localStorage.setItem('aqualog_users', JSON.stringify(users));
        AquaDB.setUser({ email, name });
      } else {
        const user = users.find((u) => u.email === email && u.pw === pw);
        if (!user) return showErr('Invalid email or password.');
        AquaDB.setUser({ email, name: user.name });
      }

      if (window.AquaUI?.navigate) window.AquaUI.navigate('dashboard.html');
      else window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
