<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaLog - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 24px; }
    .tank-select-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      padding: 10px 14px;
      margin-bottom: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 18px 42px rgba(0,0,0,0.18);
    }
    .tank-select-bar label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .tank-select-bar select { background: none; border: none; color: var(--text); font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; outline: none; cursor: pointer; }
    .tank-select-bar select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 30px;
      background:
        linear-gradient(45deg, transparent 50%, var(--accent3) 50%),
        linear-gradient(135deg, var(--accent3) 50%, transparent 50%);
      background-position: calc(100% - 12px) 54%, calc(100% - 6px) 54%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      min-width: 150px;
    }
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
    .stat-value-big { font-size: 32px; font-weight: 800; line-height: 1; color: var(--text); }
    .hero-shell {
      margin-bottom: 18px;
      padding: 22px 22px 18px;
      position: relative;
      overflow: hidden;
    }
    .hero-shell::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(140, 240, 234, 0.16), transparent 68%);
      pointer-events: none;
    }
    .hero-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; align-items: end; }
    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      line-height: 1;
      margin-bottom: 10px;
    }
    .hero-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent3);
      margin-bottom: 12px;
      font-weight: 800;
    }
    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .hero-chip {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(126, 214, 220, 0.12);
      color: var(--text2);
      font-size: 12px;
      font-weight: 700;
    }
    .hero-side {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .hero-side .card {
      min-height: 100%;
    }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(126, 214, 220, 0.08); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--accent3), var(--accent2));
      margin-top: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(103, 216, 214, 0.08);
    }
    .activity-text { font-size: 13px; color: var(--text2); }
    .activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .alert-bar {
      background: rgba(241, 191, 112, 0.12);
      border: 1px solid rgba(241, 191, 112, 0.24);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--warn);
    }
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .no-tank-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 84px 20px;
      text-align: center;
    }
    .no-tank-cta .cta-mark {
      width: 88px;
      height: 88px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(22, 148, 171, 0.3);
    }
    .no-tank-cta h2 { font-family: 'DM Serif Display', serif; font-size: 28px; }
    .no-tank-cta p { color: var(--text2); max-width: 320px; font-size: 14px; }
    canvas { max-height: 220px; }
    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .charts-grid { grid-template-columns: 1fr; }
      .hero-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="nav-mount"></div>
    <div class="main-content">
      <div id="app"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="nav.js"></script>
  <script>
    if (!AquaDB.requireAuth()) throw '';

    document.getElementById('nav-mount').innerHTML = renderNav('dashboard');

    let chart = null;
    let currentTankId = null;

    function render() {
      const tanks = AquaDB.getTanks();
      const app = document.getElementById('app');

      if (tanks.length === 0) {
        app.innerHTML = `
          <div class="no-tank-cta">
            <div class="cta-mark">
              <img src="https://i.ibb.co/XfF9nN4X/Chat-GPT-Image-May-11-2026-05-18-16-PM.png" alt="AquaLog logo" class="brand-logo-img">
            </div>
            <h2>Welcome to AquaLog</h2>
            <p>Add your first tank to start tracking water parameters, livestock, and maintenance.</p>
            <a href="tanks.html" class="btn btn-primary">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add First Tank
            </a>
          </div>`;
        return;
      }

      if (!currentTankId || !AquaDB.getTank(currentTankId)) {
        currentTankId = tanks[0].id;
      }

      const tank = AquaDB.getTank(currentTankId);
      const latestTest = AquaDB.getLatestTest(currentTankId);
      const tests = AquaDB.getTestsForTank(currentTankId).slice(0, 7).reverse();
      const logs = AquaDB.getLogsForTank(currentTankId).slice(0, 5);
      const dueReminders = AquaDB.getDueReminders();
      const livestock = AquaDB.getLivestockForTank(currentTankId);
      const livestockCount = livestock.reduce((sum, item) => sum + (parseInt(item.qty, 10) || 1), 0);
      const stocking = AquaDB.getStockingSummary(currentTankId);

      const tankOptions = tanks.map((t) =>
        `<option value="${t.id}" ${t.id === currentTankId ? 'selected' : ''}>${t.name}</option>`
      ).join('');

      const alertHtml = dueReminders.length ? `
        <div class="alert-bar">
          Alert:
          <strong>${dueReminders.length} reminder${dueReminders.length > 1 ? 's' : ''} overdue</strong>
          <a href="maintenance.html" style="color:inherit;text-decoration:underline">View in Maintenance</a>
        </div>` : '';

      const statsHtml = latestTest ? `
        <div class="stat-grid">
          ${statCard('pH', latestTest.ph, '', 'ph')}
          ${statCard('Temp', latestTest.temp, tank.tempUnit || 'deg F', 'temp')}
          ${statCard('Ammonia', latestTest.ammonia, 'ppm', 'ammonia')}
          ${statCard('Nitrate', latestTest.nitrate, 'ppm', 'nitrate')}
        </div>
        <div class="charts-grid">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
              <div style="font-weight:700;font-size:14px">Parameter Trends</div>
              <div style="font-size:12px;color:var(--text3)">Last ${tests.length} tests</div>
            </div>
            <canvas id="param-chart"></canvas>
          </div>
          <div class="card">
            <div style="font-weight:700;font-size:14px;margin-bottom:16px">Recent Activity</div>
            <div id="activity-list">
              ${logs.length === 0 ? '<p style="font-size:13px;color:var(--text3)">No maintenance logged yet.</p>' :
                logs.map((log) => `
                  <div class="activity-item">
                    <div class="activity-dot"></div>
                    <div>
                      <div class="activity-text">${log.type}: ${log.notes || 'No notes'}</div>
                      <div class="activity-time">${AquaDB.timeAgo(log.date)}</div>
                    </div>
                  </div>`).join('')}
            </div>
          </div>
        </div>` : `
        <div class="card" style="display:flex;align-items:center;gap:16px;padding:24px;margin-bottom:20px">
          <span style="font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)">No tests</span>
          <div>
            <div style="font-weight:700">No water tests recorded yet</div>
            <div style="font-size:13px;color:var(--text2);margin-top:4px">Log a water test to start seeing parameter trends.</div>
          </div>
          <a href="water-tests.html" class="btn btn-primary" style="margin-left:auto">Log Test</a>
        </div>`;

      app.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Overview of your tank status.</p>
          </div>
          <div class="quick-actions">
            <a href="water-tests.html" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Log Water Test
            </a>
          </div>
        </div>
        <div class="page-body">
          <div class="card hero-shell">
            <div class="hero-grid">
              <div>
                <div class="hero-kicker">Current focus</div>
                <div class="hero-title">${tank.name}</div>
                <div class="page-subtitle">A quick water-quality and husbandry snapshot for your active aquarium.</div>
                <div class="hero-meta">
                  <span class="hero-chip">${tank.type || 'Freshwater'}</span>
                  <span class="hero-chip">${tank.volume}${tank.volumeUnit || 'gal'}</span>
                  <span class="hero-chip">${livestockCount} livestock</span>
                  <span class="hero-chip">Stocking ${stocking.percent}%</span>
                </div>
              </div>
              <div class="hero-side">
                <div class="card card-sm" style="padding:16px 16px 14px">
                  <div class="stat-label">Last Test</div>
                  <div class="stat-value" style="font-size:24px">${latestTest ? AquaDB.formatDate(latestTest.date) : 'None yet'}</div>
                </div>
                <div class="card card-sm" style="padding:16px 16px 14px">
                  <div class="stat-label">Status</div>
                  <div class="stat-value" style="font-size:24px">${getTankStatusLabel(latestTest)}</div>
                </div>
                <div class="card card-sm" style="padding:16px 16px 14px">
                  <div class="stat-label">Stocking</div>
                  <div class="stat-value" style="font-size:24px">${stocking.percent}%</div>
                  <span class="badge ${stocking.status.badge}" style="margin-top:10px">${stocking.status.label}</span>
                </div>
              </div>
            </div>
          </div>
          ${alertHtml}
          <div class="tank-select-bar">
            <label>Viewing:</label>
            <select id="tank-switcher">${tankOptions}</select>
            <div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <span class="badge ${getTankStatusBadge(latestTest)}">${getTankStatusLabel(latestTest)}</span>
              <span class="badge ${stocking.status.badge}">Stocking ${stocking.percent}%</span>
              <span style="font-size:12px;color:var(--text3)">${tank.volume}${tank.volumeUnit || 'gal'} | ${tank.type || 'Freshwater'}</span>
              <span style="font-size:12px;color:var(--text3)">| ${livestockCount} livestock</span>
            </div>
          </div>
          ${statsHtml}
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <a href="tanks.html" class="btn btn-secondary btn-sm">Tank Settings</a>
            <a href="livestock.html" class="btn btn-secondary btn-sm">Livestock</a>
            <a href="maintenance.html" class="btn btn-secondary btn-sm">Maintenance</a>
          </div>
        </div>`;

      document.getElementById('tank-switcher').addEventListener('change', (event) => {
        currentTankId = event.target.value;
        render();
      });

      if (tests.length > 0) {
        requestAnimationFrame(() => {
          const ctx = document.getElementById('param-chart')?.getContext('2d');
          if (!ctx) return;
          if (chart) chart.destroy();
          const labels = tests.map((test) => AquaDB.formatDate(test.date));
          chart = new Chart(ctx, {
            type: 'line',
            data: {
              labels,
              datasets: [
                { label: 'pH', data: tests.map((test) => test.ph), borderColor: '#8cf0ea', backgroundColor: 'rgba(140,240,234,0.08)', tension: 0.4, pointRadius: 4 },
                { label: 'Ammonia', data: tests.map((test) => test.ammonia), borderColor: '#ff7e7e', backgroundColor: 'rgba(255,126,126,0.08)', tension: 0.4, pointRadius: 4 },
                { label: 'Nitrate/10', data: tests.map((test) => (test.nitrate / 10).toFixed(2)), borderColor: '#67d8d6', backgroundColor: 'rgba(103,216,214,0.08)', tension: 0.4, pointRadius: 4 },
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: {
                legend: {
                  labels: {
                    color: '#a5cfd8',
                    font: { family: 'Manrope', size: 12 },
                    boxWidth: 12,
                    padding: 14
                  }
                }
              },
              scales: {
                x: { ticks: { color: '#6f9aa5', font: { size: 11 } }, grid: { color: 'rgba(126,214,220,0.08)' } },
                y: { ticks: { color: '#6f9aa5', font: { size: 11 } }, grid: { color: 'rgba(126,214,220,0.08)' } }
              }
            }
          });
        });
      }
    }

    function statCard(label, value, unit, param) {
      const status = value !== undefined && value !== '' ? AquaDB.getParamStatus(param, value) : 'unknown';
      const display = value !== undefined && value !== '' ? value : '--';
      const badgeMap = { ok: 'badge-ok', warn: 'badge-warn', danger: 'badge-danger', low: 'badge-low', unknown: 'badge-unknown' };
      const labelMap = { ok: 'Good', warn: 'Watch', danger: 'High', low: 'Low', unknown: 'N/A' };
      return `
        <div class="card stat-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div class="stat-label">${label}</div>
            <span class="badge ${badgeMap[status]}">${labelMap[status]}</span>
          </div>
          <div class="stat-value-big">${display}<span class="stat-unit" style="font-size:14px;color:var(--text3);margin-left:4px">${unit}</span></div>
        </div>`;
    }

    function getTankStatusBadge(test) {
      if (!test) return 'badge-unknown';
      const params = ['ph', 'ammonia', 'nitrate'];
      const statuses = params.map((param) => test[param] !== undefined ? AquaDB.getParamStatus(param, test[param]) : 'unknown');
      if (statuses.includes('danger')) return 'badge-danger';
      if (statuses.includes('warn')) return 'badge-warn';
      if (statuses.includes('unknown')) return 'badge-unknown';
      return 'badge-ok';
    }

    function getTankStatusLabel(test) {
      if (!test) return 'No Data';
      const params = ['ph', 'ammonia', 'nitrate'];
      const statuses = params.map((param) => test[param] !== undefined ? AquaDB.getParamStatus(param, test[param]) : 'unknown');
      if (statuses.includes('danger')) return 'Alert';
      if (statuses.includes('warn')) return 'Watch';
      return 'Stable';
    }

    render();
  </script>
</body>
</html>
